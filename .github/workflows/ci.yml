name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Audit server dependencies
        working-directory: server
        run: |
          npm ci
          npm audit --audit-level=moderate
        continue-on-error: true
        
      - name: Audit client dependencies
        working-directory: client
        run: |
          npm ci
          npm audit --audit-level=moderate
        continue-on-error: true

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install server dependencies
        working-directory: server
        run: npm ci
        
      - name: Type check server
        working-directory: server
        run: npx tsc --noEmit
        
      - name: Install client dependencies
        working-directory: client
        run: npm ci
        
      - name: Lint client
        working-directory: client
        run: npm run lint
        continue-on-error: true

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      
      - name: Install dependencies
        working-directory: server
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: server
        run: npx prisma generate
        env:
          DATABASE_URL: file:./test.db
      
      - name: Run tests
        working-directory: server
        run: npm test
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key-for-ci-only-min-32-chars
          NODE_ENV: test
      
      - name: Generate coverage
        working-directory: server
        run: npm run test:coverage
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key-for-ci-only-min-32-chars
          NODE_ENV: test
        continue-on-error: true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./server/coverage/lcov.info
          flags: server
          fail_ci_if_error: false

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    needs: [security-scan, lint-and-typecheck, test-server]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      
      - name: Install dependencies
        working-directory: server
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: server
        run: npx prisma generate
      
      - name: Build
        working-directory: server
        run: npm run build
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: server/dist
          retention-days: 1

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: [security-scan, lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'
      
      - name: Install dependencies
        working-directory: client
        run: npm ci
      
      - name: Build
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: /api
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist
          retention-days: 1

  docker-build:
    name: Build & Scan Docker Images
    runs-on: ubuntu-latest
    needs: [build-server, build-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: secrets.DOCKER_USERNAME != ''
          
      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: nurse-guru-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          
      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: nurse-guru-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          
      - name: Scan server image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nurse-guru-server:latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          
      - name: Scan client image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nurse-guru-client:latest
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-server, build-client]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      
      - name: Setup database
        working-directory: server
        run: |
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: file:./test.db
      
      - name: Start server
        working-directory: server
        run: |
          npm run dev &
          echo $! > server.pid
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key-for-ci-only-min-32-chars
          PORT: 3001
          NODE_ENV: test
      
      - name: Wait for server
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3001/api/health; do sleep 2; done'
      
      - name: Run integration tests
        working-directory: server
        run: npm test
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key-for-ci-only-min-32-chars
          API_URL: http://localhost:3001
      
      - name: Stop server
        if: always()
        run: |
          if [ -f server/server.pid ]; then
            kill $(cat server/server.pid) || true
          fi
