name: CI - Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    
    services:
      sqlite:
        image: nouchka/sqlite3
        options: >-
          --name sqlite
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install server dependencies
        working-directory: server
        run: npm install
      
      - name: Setup database
        working-directory: server
        run: npm run db:generate
        env:
          DATABASE_URL: file:./test.db
      
      - name: Run server tests
        working-directory: server
        run: npm test -- --passWithNoTests
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key
          NODE_ENV: test
      
      - name: Server test coverage
        working-directory: server
        run: npm run test:coverage -- --passWithNoTests
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key
          NODE_ENV: test
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./server/coverage/coverage-final.json
          flags: server
          fail_ci_if_error: false

  client-build:
    name: Client Build & Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install client dependencies
        working-directory: client
        run: npm install
      
      - name: Run linter
        working-directory: client
        run: npm run lint
        continue-on-error: true
      
      - name: Build client
        working-directory: client
        run: npm run build

  server-build:
    name: Server Build & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install server dependencies
        working-directory: server
        run: npm install
      
      - name: Type check
        working-directory: server
        run: npx tsc --noEmit
      
      - name: Build server
        working-directory: server
        run: npm run build

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [server-build, client-build]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install server dependencies
        working-directory: server
        run: npm install
      
      - name: Setup test database
        working-directory: server
        run: npm run db:generate
        env:
          DATABASE_URL: file:./test.db
      
      - name: Start server in background
        working-directory: server
        run: npm run dev &
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key
          PORT: 3001
      
      - name: Wait for server
        run: sleep 5
      
      - name: Run integration tests
        working-directory: server
        run: npm test
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: test-secret-key
          API_URL: http://localhost:3001
